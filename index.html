<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Unity Style Three.js Grid Environment</title>
  <link rel="stylesheet" href="./styles.css" />

  <!-- Three.js CDN imports. Works on GitHub Pages with no build step. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <div class="hud">
    <div>
      <strong>Unity-style Three.js Scene</strong>
      <span>100m grid · mobile ready</span>
    </div>

    <div class="buttons">
      <button id="resetCameraBtn">Reset</button>
      <button id="topViewBtn">Top</button>
      <button id="toggleGridBtn">Grid</button>
    </div>
  </div>

  <div class="touch-help">
    <span>1 finger: orbit</span>
    <span>2 fingers: zoom / pan</span>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
