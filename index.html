<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>The SandBox</title>
  <link rel="stylesheet" href="./styles.css" />

  <!-- Three.js CDN imports. Works on GitHub Pages with no build step. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <button id="toolsToggleBtn" class="tools-toggle">Tools</button>

  <aside id="toolsPanel" class="tools-panel" aria-label="Tools panel">
    <div class="panel-header">
      <div>
        <strong>Tools</strong>
        <span>The SandBox builder</span>
      </div>
      <button id="closeToolsBtn" class="icon-btn" aria-label="Close tools">×</button>
    </div>

    <div class="tool-section">
      <div class="breadcrumb">Add &gt; Mesh</div>

      <button id="blockToolBtn" class="tool-card">
        <strong>Block</strong>
        <span>0.5m × 0.125m × 0.25m brick block</span>
      </button>
    </div>

    <div class="tool-section">
      <button id="cancelToolBtn" class="secondary-btn">Cancel active tool</button>
      <button id="clearBlocksBtn" class="danger-btn">Clear blocks</button>
    </div>

    <div class="tool-note">
      <strong>Brick snap</strong>
      <p>Each 1m cube fits 2 bricks long, 4 bricks deep, and 8 rows high. Tap the same slot to stack upward.</p>
    </div>
  </aside>

  <div class="hud">
    <div>
      <strong>The SandBox</strong>
      <span id="activeSquareLabel">Tap a grid square</span>
      <span id="toolStatusLabel">Tool: Select</span>
    </div>

    <div class="buttons">
      <button id="resetCameraBtn">Reset</button>
      <button id="topViewBtn">Top</button>
      <button id="toggleGridBtn">Grid</button>
    </div>
  </div>

  <div class="touch-help">
    <span>Tap: select/place</span>
    <span>Drag: orbit</span>
    <span>Pinch: zoom</span>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
