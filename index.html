<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#101318" />
  <title>iOS Three.js Voxel Builder</title>
  <link rel="stylesheet" href="style.css" />

  <!-- GitHub Pages friendly ES-module setup. Pinned to three.js r184. -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="hud" class="panel">
    <div class="title">Voxel Yard Builder</div>
    <div class="sub">1000×1000 world · 0.5 snapping</div>

    <div class="button-row">
      <button id="placeBtn" class="active">Place</button>
      <button id="selectBtn">Select</button>
      <button id="eraseBtn">Erase</button>
    </div>

    <div class="button-row">
      <button id="mergeBtn" class="primary">Merge + Dissolve</button>
      <button id="separateBtn">Separate</button>
    </div>

    <div class="button-row">
      <button id="deleteBtn">Delete Selected</button>
      <button id="clearBtn" class="danger">Clear</button>
    </div>

    <label class="toggle">
      <input id="ghostToggle" type="checkbox" checked />
      <span>Ghost placement cube</span>
    </label>

    <div id="stats" class="stats"></div>
  </div>

  <div id="help" class="panel mini">
    <b>Controls</b><br />
    One-finger tap: place/select<br />
    One-finger drag: orbit<br />
    Two-finger drag: pan<br />
    Pinch: zoom
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
